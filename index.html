<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Archive - 한/영 각주 아카이브</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --border: #e2e8f0;
      --text: #1a202c;
      --text-secondary: #64748b;
      --accent: #2563eb;
      --accent-light: #dbeafe;
      --ko-accent: #4f46e5;
      --en-accent: #0891b2;
      --copy-success: #16a34a;
      --highlight: #fef08a;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
      color: white;
      padding: 2.5rem 1rem 2rem;
      text-align: center;
    }

    .header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      letter-spacing: -0.02em;
    }

    .header p {
      font-size: 0.9rem;
      opacity: 0.85;
    }

    .search-container {
      max-width: 720px;
      margin: -1.5rem auto 0;
      padding: 0 1rem;
      position: relative;
      z-index: 10;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 0.5rem 1rem;
      gap: 0.75rem;
    }

    .search-icon {
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 1rem;
      padding: 0.75rem 0;
      background: transparent;
      color: var(--text);
    }

    .search-box input::placeholder { color: var(--text-secondary); }

    .search-clear {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      padding: 4px;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .search-clear:hover { background: var(--bg); }
    .search-clear.visible { display: flex; }

    .controls {
      max-width: 720px;
      margin: 1rem auto 0;
      padding: 0 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .result-count {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .filter-buttons {
      display: flex;
      gap: 0.5rem;
    }

    .filter-btn {
      padding: 0.35rem 0.85rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      font-size: 0.8rem;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    .card-list {
      max-width: 720px;
      margin: 1rem auto 2rem;
      padding: 0 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .card {
      background: var(--card-bg);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      transition: box-shadow 0.15s;
    }

    .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }

    .card-row {
      display: flex;
      align-items: stretch;
    }

    .lang-label {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 0.4rem;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      flex-shrink: 0;
      min-width: 28px;
    }

    .lang-label.ko { background: #eef2ff; color: var(--ko-accent); }
    .lang-label.en { background: #ecfeff; color: var(--en-accent); }

    .card-content {
      flex: 1;
      padding: 0.85rem 1rem;
      min-width: 0;
    }

    .term-row {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.35rem;
    }

    .term {
      font-weight: 700;
      font-size: 1rem;
      word-break: break-word;
    }

    .copy-btn {
      flex-shrink: 0;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 0.7rem;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.15s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

    .copy-btn.copied {
      border-color: var(--copy-success);
      color: var(--copy-success);
      background: #f0fdf4;
    }

    .desc {
      font-size: 0.88rem;
      color: var(--text-secondary);
      line-height: 1.65;
      word-break: keep-all;
    }

    .card-divider {
      height: 1px;
      background: var(--border);
      margin: 0;
    }

    mark {
      background: var(--highlight);
      color: inherit;
      padding: 0 2px;
      border-radius: 2px;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-secondary);
    }

    .empty-state svg { margin-bottom: 1rem; opacity: 0.4; }
    .empty-state p { font-size: 0.95rem; }

    .footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1e293b;
      color: white;
      padding: 0.65rem 1.25rem;
      border-radius: 8px;
      font-size: 0.85rem;
      opacity: 0;
      transition: all 0.3s;
      z-index: 100;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 600px) {
      .header h1 { font-size: 1.35rem; }
      .card-content { padding: 0.7rem 0.85rem; }
      .term { font-size: 0.92rem; }
      .desc { font-size: 0.82rem; }
      .controls { flex-direction: column; gap: 0.5rem; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>Word Archive</h1>
  <p>한/영 각주 아카이브</p>
</div>

<div class="search-container">
  <div class="search-box">
    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
    </svg>
    <input type="text" id="searchInput" placeholder="용어 또는 설명 검색... (한글/영문)" autocomplete="off">
    <button class="search-clear" id="clearBtn" aria-label="검색어 지우기">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
      </svg>
    </button>
  </div>
</div>

<div class="controls">
  <span class="result-count" id="resultCount"></span>
  <div class="filter-buttons">
    <button class="filter-btn active" data-filter="all">전체</button>
    <button class="filter-btn" data-filter="ko">한글</button>
    <button class="filter-btn" data-filter="en">영문</button>
  </div>
</div>

<div class="card-list" id="cardList"></div>

<div class="footer">
  <p>Word Archive &copy; 2026 Nara Space &mdash; 텍스트를 클릭하여 복사할 수 있습니다.</p>
</div>

<div class="toast" id="toast">클립보드에 복사되었습니다</div>

<script>

let currentFilter = 'all';
const searchInput = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');
const cardList = document.getElementById('cardList');
const resultCount = document.getElementById('resultCount');
const toast = document.getElementById('toast');

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function highlightText(text, query) {
  if (!query) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const queryEscaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const regex = new RegExp(`(${queryEscaped})`, 'gi');
  return escaped.replace(regex, '<mark>$1</mark>');
}

function matchesQuery(item, query) {
  if (!query) return true;
  const q = query.toLowerCase();
  return item.ko_term.toLowerCase().includes(q) ||
         item.ko_desc.toLowerCase().includes(q) ||
         item.en_term.toLowerCase().includes(q) ||
         item.en_desc.toLowerCase().includes(q);
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg> copied';
    showToast();
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg> copy';
    }, 1500);
  });
}

function showToast() {
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}

function renderCards() {
  const query = searchInput.value.trim();
  const filtered = DATA.filter(item => matchesQuery(item, query));

  if (filtered.length === 0) {
    cardList.innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/><path d="M8 11h6"/>
        </svg>
        <p>검색 결과가 없습니다</p>
      </div>`;
    resultCount.textContent = '0건';
    return;
  }

  resultCount.textContent = query ? `${filtered.length}건 검색됨` : `총 ${filtered.length}건`;

  const showKo = currentFilter === 'all' || currentFilter === 'ko';
  const showEn = currentFilter === 'all' || currentFilter === 'en';

  cardList.innerHTML = filtered.map(item => {
    const koSection = showKo ? `
      <div class="card-row">
        <div class="lang-label ko">KO</div>
        <div class="card-content">
          <div class="term-row">
            <span class="term">${highlightText(item.ko_term, query)}</span>
            <button class="copy-btn" onclick="event.stopPropagation(); copyText('${item.ko_term.replace(/'/g, "\\'")}', this)">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg> copy
            </button>
          </div>
          <p class="desc">${highlightText(item.ko_desc, query)}</p>
        </div>
      </div>` : '';

    const enSection = showEn ? `
      <div class="card-row">
        <div class="lang-label en">EN</div>
        <div class="card-content">
          <div class="term-row">
            <span class="term">${highlightText(item.en_term, query)}</span>
            <button class="copy-btn" onclick="event.stopPropagation(); copyText('${item.en_term.replace(/'/g, "\\'")}', this)">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg> copy
            </button>
          </div>
          <p class="desc">${highlightText(item.en_desc, query)}</p>
        </div>
      </div>` : '';

    const divider = showKo && showEn ? '<div class="card-divider"></div>' : '';

    return `<div class="card">${koSection}${divider}${enSection}</div>`;
  }).join('');
}

searchInput.addEventListener('input', () => {
  clearBtn.classList.toggle('visible', searchInput.value.length > 0);
  renderCards();
});

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  clearBtn.classList.remove('visible');
  searchInput.focus();
  renderCards();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderCards();
  });
});

document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
  if (e.key === 'Escape') {
    searchInput.value = '';
    clearBtn.classList.remove('visible');
    searchInput.blur();
    renderCards();
  }
});

renderCards();
</script>

</body>
</html>
